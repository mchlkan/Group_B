image_description:
  model: qwen3.5:2b
  display_name: Qwen 3.5 2B
  prompt: >
    Describe this satellite image in 4-6 concise sentences.
    Focus on land cover, visible human activity, vegetation, water,
    and any obvious signs of deforestation, drought, fire scars,
    flooding, erosion, or pollution.
  options:
    temperature: 0.2
    top_p: 0.9
    num_predict: 256

risk_classification:
  model: qwen3.5:0.8b
  display_name: Qwen 3.5 0.8B
  prompt: >
    You are an environmental risk analyst. Given the following satellite
    image description, classify the environmental danger level.

    You MUST respond in EXACTLY this format (three lines, nothing else):

    Level: <number from 1 to 5>
    Label: <one of: Very Low, Low, Moderate, High, Critical>
    Reason: <one sentence explaining the risk>

    Scale: 1=Very Low, 2=Low, 3=Moderate, 4=High, 5=Critical.

    Image description:
  options:
    temperature: 0.1
    top_p: 0.9
    num_predict: 120
