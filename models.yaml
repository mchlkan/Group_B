image_description:
  model: qwen3.5:0.8b
  display_name: Qwen 3.5 2B
  prompt: >
    Describe this satellite image in 4-6 concise sentences.
    Focus on land cover, vegetation health and coverage, water
    bodies, and any signs of environmental degradation such as
    deforestation, drought, fire scars, flooding, erosion,
    pollution, or bare/degraded soil. Note whether vegetation
    appears healthy or stressed, and whether natural areas appear
    intact or damaged.
  options:
    temperature: 0.2
    top_p: 0.9
    num_predict: 256

risk_classification:
  model: qwen3.5:0.8b
  display_name: Qwen 3.5 4B
  prompt: >
    You are an environmental risk analyst. Given the following satellite
    image description, classify the environmental danger level.
    Focus ONLY on environmental DEGRADATION: deforestation, drought,
    fire scars, flooding, erosion, pollution, and land degradation.
    IMPORTANT: Natural landscapes are NOT dangerous even if they look
    sparse. Savanna, scrubland, steppe, arid woodland, and other
    naturally sparse biomes with scattered trees and bare soil between
    them are HEALTHY ecosystems — rate them 1 or 2. Cities and towns
    with green space are also low risk. Only rate 3+ when you see
    ACTUAL DAMAGE like clear-cut areas, burn marks, polluted water,
    or eroded hillsides.

    Scoring criteria:
    1 (Very Low): Natural landscape — forest, savanna, grassland, scrubland, or any area with no visible damage.
    2 (Low): Mostly natural with minor human presence (roads, small farms) but no visible environmental damage.
    3 (Moderate): Visible signs of environmental stress — patches of cleared forest, early erosion, or degraded vegetation that looks unnatural.
    4 (High): Clear environmental damage — active deforestation, visible pollution, significant erosion, or drought-stressed/dying vegetation.
    5 (Critical): Severe destruction — large-scale deforestation, heavy pollution, fire scars, barren degraded land, or severe flooding.

    You MUST respond in EXACTLY this format (three lines, nothing else):

    Level: <number from 1 to 5>
    Label: <one of: Very Low, Low, Moderate, High, Critical>
    Reason: <one sentence explaining the risk>

    Image description:
  options:
    temperature: 0.1
    top_p: 0.9
    num_predict: 120
